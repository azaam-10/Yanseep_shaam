    <script>
      // Force unregister service workers to fix caching issues
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('Service Worker unregistered');
          }
        });
      }
      // Clear all caches and reload if first time seeing this version
      const VERSION = '1.0.7'; // Increment version
      if (localStorage.getItem('app_version') !== VERSION) {
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) caches.delete(name);
          });
        }
        localStorage.setItem('app_version', VERSION);
        console.log('New version detected, clearing cache and reloading...');
        window.location.reload(true);
      }
    </script>
